<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard – LearnPath</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
body {
  background: #f5f0e8;
  font-family: 'DM Sans', sans-serif;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: 60px auto;
  padding: 20px;
}

h1 {
  font-family: 'Fraunces', serif;
  margin-bottom: 30px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 30px;
  margin-bottom: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.stat {
  font-size: 2rem;
  font-weight: bold;
  margin-top: 10px;
}

.logout-btn {
  background: #0f0e0c;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Fraunces', serif;
}
.logout-btn:hover {
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">

  <h1>Admin Dashboard</h1>

  <div class="card">
    <div>Total Students</div>
    <div class="stat" id="total-students">0</div>
  </div>

  <div class="card">
    <div>Total Logs</div>
    <div class="stat" id="total-logs">0</div>
  </div>

  <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", async function () {

  const token = localStorage.getItem("token");

  if (!token) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetch("https://learnpath-backend-esqg.onrender.com/api/admin/dashboard", {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!response.ok) {
      alert("Access denied. Admin only.");
      window.location.href = "login.html";
      return;
    }

    const data = await response.json();

    document.getElementById("total-students").textContent = data.total_students;
    document.getElementById("total-logs").textContent = data.total_logs;

  } catch (error) {
    console.error("Error:", error);
    alert("Server error. Try again later.");
  }
});

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}
</script>

</body>
</html>
